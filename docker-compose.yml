services:
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: alquila_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: user_app
      MYSQL_PASSWORD: user_password
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10