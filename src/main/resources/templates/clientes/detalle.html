<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head}">
    <title>Sleipnir - Detalle Cliente</title>
</head>

<body class="bg-light">

    <nav th:replace="~{layout :: header}"></nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Ficha del Cliente</h5>
                        <span class="badge bg-secondary" th:text="'ID: ' + ${cliente.id}"></span>
                    </div>
                    <div class="card-body">
                        <dl class="row mb-0">
                            <dt class="col-sm-4">Nombre</dt>
                            <dd class="col-sm-8" th:text="${cliente.nombre}"></dd>

                            <dt class="col-sm-4">Apellidos</dt>
                            <dd class="col-sm-8" th:text="${cliente.apellidos}"></dd>

                            <dt class="col-sm-4">Email</dt>
                            <dd class="col-sm-8">
                                <a th:href="'mailto:' + ${cliente.email}" th:text="${cliente.email}"></a>
                            </dd>
                        </dl>
                    </div>
                    <div class="card-footer d-flex justify-content-between">
                        <a th:href="@{/clientes/lista}" class="btn btn-secondary btn-sm">
                            Volver
                        </a>
                        <a th:href="@{/clientes/editar/{id}(id=${cliente.id})}" class="btn btn-warning btn-sm">
                            Editar
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
