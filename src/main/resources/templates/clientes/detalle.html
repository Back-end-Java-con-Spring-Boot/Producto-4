<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{layout :: head}">
    <title>Sleipnir - Detalle del Cliente</title>
</head>

<body class="d-flex flex-column min-vh-100">

    <nav th:replace="~{layout :: header}"></nav>

    <main class="container flex-grow-1 admin-header" style="max-width: 700px;">

        <div class="mb-4 d-flex justify-content-between align-items-center">
            <h2 class="fw-bold text-white m-0">Ficha del Cliente</h2>
            <span class="badge rounded-pill bg-primary px-3 py-2" th:text="'ID: ' + ${cliente.id}"></span>
        </div>

        <div class="card table-card border-0 overflow-hidden">
            <div class="card-header bg-white py-4 border-0 text-center">
                <div class="bg-light d-inline-block rounded-circle p-4 mb-2">
                    <i class="bi bi-person-circle fs-1 text-primary"></i>
                </div>
                <h3 class="fw-bold text-dark mb-0"
                    th:text="${cliente.nombre} + ' ' + ${cliente.apellidos}"></h3>
            </div>
            <div class="card-body px-5 pb-5 text-dark">
                <div class="row g-4">
                    <div class="col-12 border-bottom pb-2">
                        <label class="small text-uppercase fw-bold text-muted d-block">Correo Electrónico</label>
                        <a th:href="'mailto:' + ${cliente.email}"
                           class="fs-5 text-decoration-none col-id"
                           th:text="${cliente.email}"></a>
                    </div>
                    <div class="col-sm-6">
                        <label class="small text-uppercase fw-bold text-muted d-block">Nombre</label>
                        <span class="fs-5" th:text="${cliente.nombre}"></span>
                    </div>
                    <div class="col-sm-6">
                        <label class="small text-uppercase fw-bold text-muted d-block">Apellidos</label>
                        <span class="fs-5" th:text="${cliente.apellidos}"></span>
                    </div>
                </div>
            </div>
            <div class="card-footer bg-light border-0 p-4 d-flex justify-content-between">
                <a th:href="@{/admin/clientes}" class="btn btn-outline-secondary rounded-pill px-4">
                    <i class="bi bi-arrow-left me-1"></i> Volver
                </a>
                <!-- Botón editar solo para ADMIN -->
                <a sec:authorize="hasRole('ADMIN')"
                   th:href="@{/admin/clientes/editar/{id}(id=${cliente.id})}"
                   class="btn btn-primary rounded-pill px-4 fw-bold">
                    <i class="bi bi-pencil-fill me-1"></i> Editar
                </a>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
</body>

</html>
