<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head}">
    <title>Sleipnir - Lista de Clientes</title>
</head>

<body class="bg-light">

    <nav th:replace="~{layout :: header}"></nav>

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-dark">Clientes Registrados</h2>
            <a th:href="@{/clientes/nuevo}" class="btn btn-primary shadow-sm">
                <i class="bi bi-plus-circle"></i> Añadir Cliente
            </a>
        </div>

        <!-- Mensajes flash -->
        <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${mensaje}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Nombre</th>
                            <th>Apellidos</th>
                            <th>Email</th>
                            <th class="text-center pe-4">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(listaClientes)}">
                            <td colspan="5" class="text-center py-4 text-muted">
                                No hay clientes registrados actualmente.
                            </td>
                        </tr>
                        <tr th:each="cliente : ${listaClientes}">
                            <td class="ps-4 fw-bold" th:text="${cliente.id}"></td>
                            <td th:text="${cliente.nombre}"></td>
                            <td th:text="${cliente.apellidos}"></td>
                            <td th:text="${cliente.email}"></td>
                            <td class="text-center pe-4">
                                <div class="btn-group" role="group">
                                    <a th:href="@{/clientes/{id}(id=${cliente.id})}"
                                        class="btn btn-sm btn-outline-info">Ver</a>
                                    <a th:href="@{/clientes/editar/{id}(id=${cliente.id})}"
                                        class="btn btn-sm btn-outline-warning">Editar</a>
                                    <form th:action="@{/clientes/eliminar/{id}(id=${cliente.id})}" method="post"
                                        class="d-inline"
                                        onsubmit="return confirm('¿Estás seguro de borrar este cliente?')">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">Borrar</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
