<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{layout :: head}">
    <title>Sleipnir - Nuevo Cliente</title>
</head>

<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout :: header}"></nav>

<main class="container flex-grow-1 admin-header" style="max-width: 800px;">
    <div th:replace="~{layout :: alertas}"></div>

    <div class="mb-4">
        <h2 class="fw-bold text-white m-0">
            <i class="bi bi-person-plus-fill me-2"></i> Nuevo Cliente
        </h2>
        <p class="text-white-50">Crea una cuenta de acceso para el cliente.</p>
    </div>

    <div class="card table-card border-0">
        <div class="card-body p-5">
            <form method="post" th:object="${usuarioDto}" th:action="@{/admin/clientes/nuevo}">

                <h5 class="fw-bold text-primary mb-3">Datos de Acceso</h5>
                <div class="row">
                    <div class="col-md-12 mb-3">
                        <label class="form-label fw-bold text-dark">Nombre de Usuario (Login)</label>
                        <input type="text" class="form-control rounded-3" th:field="*{username}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-dark">Contraseña</label>
                        <input type="password" class="form-control rounded-3" th:field="*{password}" required>
                    </div>
                    <div class="col-md-6 mb-4">
                        <label class="form-label fw-bold text-dark">Confirmar Contraseña</label>
                        <input type="password" class="form-control rounded-3" th:field="*{confirmarPassword}" required>
                        <div th:if="${#fields.hasErrors('confirmarPassword')}" class="text-danger small mt-1" th:errors="*{confirmarPassword}"></div>
                    </div>
                </div>

                <hr class="mb-4">

                <h5 class="fw-bold text-primary mb-3">Datos Personales</h5>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-dark">Nombre</label>
                        <input type="text" class="form-control rounded-3" th:field="*{nombre}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-dark">Apellidos</label>
                        <input type="text" class="form-control rounded-3" th:field="*{apellidos}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-dark">Email</label>
                        <input type="email" class="form-control rounded-3" th:field="*{email}" required>
                        <div th:if="${#fields.hasErrors('email')}" class="text-danger small mt-1" th:errors="*{email}"></div>
                    </div>
                    <div class="col-md-6 mb-4">
                        <label class="form-label fw-bold text-dark">Teléfono</label>
                        <input type="text" class="form-control rounded-3" th:field="*{telefono}">
                    </div>
                </div>

                <div class="d-flex gap-2 justify-content-end mt-2">
                    <a th:href="@{/admin/clientes}"
                       class="btn btn-light rounded-pill px-4 fw-bold border">Cancelar</a>
                    <button type="submit" class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm">
                        <i class="bi bi-person-check-fill me-1"></i> Crear Cuenta y Cliente
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>
</body>

</html>
