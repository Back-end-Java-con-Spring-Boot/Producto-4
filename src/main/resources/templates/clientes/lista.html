<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{layout :: head}">
    <title>Sleipnir - Gestión de Clientes</title>
</head>

<body class="d-flex flex-column min-vh-100">

    <nav th:replace="~{layout :: header}"></nav>

    <main class="container flex-grow-1 admin-header">

        <div th:replace="~{layout :: alertas}"></div>

        <div class="row align-items-center mb-4">
            <div class="col-md-4">
                <h2 class="fw-bold text-white m-0">Clientes</h2>
            </div>
            <div class="col-md-8 d-flex justify-content-end gap-3">
                <div class="input-group search-pill w-50">
                    <span class="input-group-text"><i class="bi bi-search text-muted"></i></span>
                    <input type="text" id="searchInput" class="form-control" placeholder="Buscar clientes...">
                </div>
                <!-- Solo ADMIN ve el botón de añadir //-->
                <a sec:authorize="hasRole('ADMIN')"
                   th:href="@{/admin/clientes/nuevo}"
                   class="btn btn-primary shadow-sm px-4 rounded-pill fw-bold">
                    <i class="bi bi-person-plus-fill me-2"></i> Añadir Cliente
                </a>
            </div>
        </div>

        <div class="card table-card border-0">
            <div class="card-body p-0">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>NOMBRE</th>
                            <th>APELLIDOS</th>
                            <th>EMAIL</th>
                            <!-- Columna acciones solo para ADMIN -->
                            <th sec:authorize="hasRole('ADMIN')" class="text-center pe-4">ACCIONES</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr th:if="${#lists.isEmpty(listaClientes)}">
                            <td colspan="5" class="text-center py-4 text-muted">No hay clientes registrados.</td>
                        </tr>
                        <tr th:each="cliente : ${listaClientes}">
                            <td class="ps-4 col-id" th:text="${cliente.id}"></td>
                            <td th:text="${cliente.nombre}"></td>
                            <td th:text="${cliente.apellidos}"></td>
                            <td th:text="${cliente.email}"></td>
                            <!-- Acciones solo para ADMIN -->
                            <td sec:authorize="hasRole('ADMIN')" class="text-center pe-4">
                                <div class="d-flex justify-content-center gap-2">
                                    <a th:href="@{/admin/clientes/{id}(id=${cliente.id})}"
                                        class="btn btn-sm text-info border-0" title="Ver Detalle">
                                        <i class="bi bi-eye-fill fs-5"></i>
                                    </a>
                                    <a th:href="@{/admin/clientes/editar/{id}(id=${cliente.id})}"
                                        class="btn btn-sm text-primary border-0" title="Editar">
                                        <i class="bi bi-pencil-square fs-5"></i>
                                    </a>
                                    <form th:action="@{/admin/clientes/eliminar/{id}(id=${cliente.id})}" method="post"
                                        class="d-inline"
                                        onsubmit="return confirm('¿Estás seguro de eliminar este cliente?')">
                                        <button type="submit" class="btn btn-sm text-danger border-0">
                                            <i class="bi bi-trash-fill fs-5"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
    <script th:src="@{/js/buscador.js}"></script>
</body>

</html>
