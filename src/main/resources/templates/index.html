<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}">
  <title>Inicio - Sleipnir Alquiler</title>
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout :: header}"></nav>

<main class="flex-grow-1 position-relative">

  <div th:if="${param.loginSuccess}"
       class="position-absolute w-100 d-flex justify-content-center"
       style="top: 20px; z-index: 3000; pointer-events: none;">

    <div class="alert alert-success fade show shadow-lg border-0 py-3 px-4"
       role="alert"
       style="pointer-events: auto; min-width: 400px; background-color: rgba(209, 231, 221, 0.95); backdrop-filter: blur(5px);">
      <div class="d-flex align-items-center text-dark">
        <i class="bi bi-shield-check me-3 fs-4 text-success"></i>
        <div>
          ¡Bienvenid@ a Sleipnir, <strong sec:authentication="name"></strong>! Has iniciado sesión.
        </div>
      </div>
    </div>
  </div>

  <header class="hero-section">
    <div class="container">
      <div class="row align-items-center w-100">

        <div class="col-lg-5 col-md-12">
          <div class="search-box">
            <h3 class="text-white fw-bold mb-4">Buscador de Vehículos</h3>
            <form class="row g-3" th:action="${#authorization.expression('hasRole(''ADMIN'')')}
                  ? @{/admin/alquiler/crear}
                  : @{/user/reservar}" method="GET" th:object="${alquiler}">

              <div class="col-12 mb-3">
                <label class="form-label text-white small fw-bold">Sucursal</label>
                <select class="form-select" th:field="*{sucursal.id}" required>
                  <option value="">Selecciona una sucursal</option>
                  <option th:each="s : ${listaSucursales}"
                          th:value="${s.id}"
                          th:text="${s.nombre}">
                  </option>
                </select>
              </div>

              <div class="col-6">
                <label class="form-label text-white small fw-bold">Fecha de Inicio</label>
                <input type="date" class="form-control" th:field="*{fechaInicioDate}" required>
              </div>
              <div class="col-6">
                <label class="form-label text-white small fw-bold">Fecha de Fin</label>
                <input type="date" class="form-control" th:field="*{fechaFinDate}" required>
              </div>

              <div class="col-6">
                <label class="form-label text-white small fw-bold">Hora de Inicio</label>
                <input type="time" class="form-control" th:field="*{fechaInicioTime}" required>
              </div>
              <div class="col-6">
                <label class="form-label text-white small fw-bold">Hora de Fin</label>
                <input type="time" class="form-control" th:field="*{fechaFinTime}" required>
              </div>

              <div class="col-12 mt-4">
                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">
                  Buscar Vehículos
                </button>
              </div>
            </form>
          </div>
        </div>

        <div class="col-lg-7 d-none d-lg-block text-end">
          <div class="hero-text-overlay">
            <h1 class="display-2 fw-bold mb-3 text-white">¡Reserva ahora!</h1>
            <p class="fs-4 mb-4 text-white">
              Las mejores condiciones del mercado,<br>
              seguro incluido y sin fianza.
            </p>
            <a th:href="@{/reservar}" class="btn btn-primary btn-lg px-5 py-3 fw-bold shadow-lg rounded-pill text-white">
              Reservar
            </a>
          </div>
        </div>

      </div>
    </div>
  </header>
</main>

<footer th:replace="~{layout :: footer}"></footer>

</body>
</html>
