<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head}">
    <title>Sleipnir - Alquiler</title>
</head>

<body>
<nav th:replace="~{layout :: header}"></nav>

<main class="container mt-5 pt-5">

    <h2 th:text="${alquiler.id == null} ? 'Nuevo Alquiler' : 'Editar Alquiler'"></h2>

    <div th:if="${errorMessage}" id="auto-close" class="alert alert-danger">
        <span th:text="${errorMessage}"></span>
    </div>

    <form th:action="@{/alquiler/guardar}" th:object="${alquiler}" method="post">

        <input type="hidden" th:field="*{id}">

        <!-- CLIENTE -->
        <div class="mb-3">
            <label class="form-label">Cliente</label>
            <select class="form-select" th:field="*{cliente.id}" required>
                <option value="">Selecciona un cliente</option>
                <option th:each="c : ${listaClientes}"
                        th:value="${c.id}"
                        th:text="${c.nombre}"></option>
            </select>
        </div>

        <!-- SUCURSAL -->
        <div class="mb-3">
            <label class="form-label">Sucursal</label>
            <select class="form-select" th:field="*{sucursal.id}" id="sucursalSelect" required>
                <option value="">Selecciona una sucursal</option>
                <option th:each="s : ${listaSucursales}"
                        th:value="${s.id}"
                        th:text="${s.nombre}"
                        th:selected="${alquiler.sucursal != null} ? ${alquiler.sucursal.id} == ${s.id} : false">
                </option>
            </select>
        </div>

        <!-- FECHAS -->
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Fecha Inicio</label>
                <input type="date" class="form-control"
                       th:field="*{fechaInicioDate}"
                       th:value="${fechaInicioDate != null} ? ${#temporals.format(fechaInicioDate, 'yyyy-MM-dd')} : ${#temporals.format(T(java.time.LocalDate).now(), 'yyyy-MM-dd')}"
                       required>
                <label class="form-label">Hora Inicio</label>
                <input type="time" class="form-control mt-1"
                       th:field="*{fechaInicioTime}"
                       th:value="${fechaInicioTime != null} ? ${#temporals.format(fechaInicioTime, 'HH:mm')} : '09:30'"
                       required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Fecha Fin</label>
                <input type="date" class="form-control"
                       th:field="*{fechaFinDate}"
                       th:value="${fechaFinDate != null} ? ${#temporals.format(fechaFinDate, 'yyyy-MM-dd')} : ${#temporals.format(T(java.time.LocalDate).now(), 'yyyy-MM-dd')}"
                       required>
                <label class="form-label">Hora Fin</label>
                <input type="time" class="form-control mt-1"
                       th:field="*{fechaFinTime}"
                       th:value="${fechaFinTime != null} ? ${#temporals.format(fechaFinTime, 'HH:mm')} : '09:30'"
                       required>
            </div>
        </div>

        <!-- VEHICULOS -->
        <div class="mb-3">
            <label class="form-label">Vehículos</label>
            <div class="border p-3 rounded" id="vehiculosContainer">

                <div th:each="v : ${listaVehiculos}" class="form-check"
                     th:attr="data-sucursal=${v.sucursal.id}">
                    <input class="form-check-input"
                           type="checkbox"
                           th:field="*{vehiculos}"
                           th:value="${v.id}"
                           th:id="${'vehiculo' + v.id}"
                           th:checked="${alquiler.vehiculos != null and alquiler.vehiculos.contains(v)}">
                    <label class="form-check-label"
                           th:for="${'vehiculo' + v.id}"
                           th:text="${v.nombre}"></label>
                </div>

            </div>
        </div>

        <!-- BOTONES -->
        <div class="mt-4">
            <button type="submit" class="btn btn-success">Guardar</button>
            <a th:href="@{/alquiler}" class="btn btn-secondary">Cancelar</a>
        </div>

    </form>

</main>
<script th:src="@{/js/mensajeError.js}"></script>
<script th:src="@{/js/vehiculosSucursal.js}"></script>
</body>
</html>
