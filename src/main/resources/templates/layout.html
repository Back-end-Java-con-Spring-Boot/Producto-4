<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" th:href="@{/css/styles.css}">
  <title>Sleipnir Alquiler</title>
</head>

<body class="d-flex flex-column min-vh-100">

<nav th:fragment="header" class="navbar navbar-expand-lg navbar-dark fixed-top py-2" style="background-color: #1a1f3d !important;">
  <div class="container">
    <a class="navbar-brand fw-bold fs-3" th:href="@{/}">Sleipnir</a>

    <div class="collapse navbar-collapse justify-content-center">
      <ul class="navbar-nav gap-4">
        <li class="nav-item">
          <a class="nav-link fw-bold" th:href="@{/}">Inicio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link fw-bold" th:href="@{/vehiculos}">Vehículos</a>
        </li>
        <li class="nav-item">
          <a class="nav-link fw-bold" th:href="@{/sucursales}">Sucursales</a>
        </li>
        <li class="nav-item">
          <a class="nav-link fw-bold" th:href="@{/alquiler}">Alquiler</a>
        </li>
      </ul>
    </div>

    <div class="text-white fs-4">
      <i class="bi bi-person-circle" style="cursor: pointer;"></i>
    </div>
  </div>
</nav>

<footer th:fragment="footer" class="main-footer mt-auto" style="background-color: #1a1f3d; color: white;">
  <div class="container py-3"> <div class="row align-items-center"> <div class="col-lg-4 mb-2 mb-lg-0">
    <a class="footer-logo text-decoration-none text-white fw-bold fs-5" th:href="@{/}">Sleipnir</a>
    <p class="text-white-50 small mb-0">Gestión profesional de flotas y sucursales.</p>
  </div>

    <div class="col-lg-4 mb-2 mb-lg-0 text-lg-center text-white-50">
      <a href="#" class="text-white me-3"><i class="bi bi-facebook fs-5"></i></a>
      <a href="#" class="text-white me-3"><i class="bi bi-instagram fs-5"></i></a>
      <a href="#" class="text-white"><i class="bi bi-twitter-x fs-5"></i></a>
    </div>

    <div class="col-lg-4 text-lg-end text-white-50 small">
      <p class="mb-0"><i class="bi bi-geo-alt me-1 text-primary"></i> Madrid, España</p>
      <p class="mb-0"><i class="bi bi-envelope me-1 text-primary"></i> info@sleipnir.es</p>
    </div>
  </div>

    <div class="border-top border-secondary mt-2 pt-2 text-center">
      <p class="text-white-50 mb-0" style="font-size: 0.75rem;">
        &copy; 2026 Sleipnir Alquiler. Hecho con <i class="bi bi-heart-fill text-danger"></i>
      </p>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
