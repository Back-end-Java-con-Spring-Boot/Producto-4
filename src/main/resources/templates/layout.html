<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" th:href="@{/css/styles.css}">
  <title>Sleipnir Alquiler</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.png}">

  <style>
    body {
      background-color: #ffffff !important;
      color: #212529;
    }
    /* Estilo para asegurar que los links de la navbar sean blancos */
    .navbar-dark .navbar-nav .nav-link {
      color: #ffffff !important;
      opacity: 0.9;
    }
    .navbar-dark .navbar-nav .nav-link:hover {
      opacity: 1;
      color: #ffc107 !important; /* El amarillo warning al pasar el ratón */
    }
    /* Ajuste para páginas de administración (donde no hay Hero) */
    .admin-container {
      padding-top: 100px;
      min-height: 80vh;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="d-flex flex-column min-vh-100">

<nav th:fragment="header" class="navbar navbar-expand-lg navbar-dark fixed-top py-2" style="background-color: #1a1f3d !important;">
  <div class="container">
    <a class="navbar-brand fw-bold fs-3 text-white" th:href="@{/}">Sleipnir</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
      <ul class="navbar-nav gap-4">
        <li class="nav-item"><a class="nav-link fw-bold text-white" th:href="@{/}">Inicio</a></li>
        <li class="nav-item"><a class="nav-link fw-bold text-white" th:href="@{/reservar}">Reserva Ahora</a></li>

        <li class="nav-item" sec:authorize="hasRole('USER')">
          <a class="nav-link fw-bold text-warning" th:href="@{/user/mis-reservas}">Mis Reservas</a>
        </li>

        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link fw-bold text-warning" th:href="@{/admin/vehiculos}">Vehículos</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link fw-bold text-warning" th:href="@{/admin/sucursales}">Sucursales</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link fw-bold text-warning" th:href="@{/admin/alquiler}">Alquiler</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link fw-bold text-warning" th:href="@{/admin/clientes}">Clientes</a>
        </li>
      </ul>
    </div>

    <div class="text-white fs-4">
      <div sec:authorize="!isAuthenticated()">
        <a th:href="@{/auth/login}" class="text-white">
          <i class="bi bi-person-circle" style="cursor: pointer;"></i>
        </a>
      </div>

      <div sec:authorize="isAuthenticated()" class="dropdown">
        <a class="text-white text-decoration-none dropdown-toggle d-flex align-items-center" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
          <i class="bi bi-person-check-fill text-success me-2"></i>
          <span class="fs-6 d-none d-md-inline text-white" sec:authentication="name">Username</span>
        </a>
        <ul class="dropdown-menu dropdown-menu-end shadow border-0">
          <li><span class="dropdown-item-text small text-muted fw-bold text-uppercase">Opciones</span></li>
          <li>
<!--            <a class="dropdown-item d-flex align-items-center" th:href="@{/user/perfil}">-->
<!--              <i class="bi bi-person-vcard me-2 text-primary"></i> Mi Perfil-->
<!--            </a>-->
<!--          </li>-->
<!--          <li><hr class="dropdown-divider"></li>-->
<!--          <li>-->
            <form th:action="@{/logout}" method="post">
              <button type="submit" class="dropdown-item text-danger d-flex align-items-center">
                <i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión
              </button>
            </form>
          </li>
        </ul>
      </div>

    </div>
  </div>
</nav>

<div th:fragment="alertas" class="container-fluid px-0">
  <div class="container">
    <div th:if="${mensajeExito}" class="alert alert-success alert-dismissible fade show shadow-sm border-0 mt-2" role="alert">
      <div class="d-flex align-items-center">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${mensajeExito}"></span>
      </div>
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
    </div>

    <div th:if="${mensajeError}" class="alert alert-danger alert-dismissible fade show shadow-sm border-0 mt-2" role="alert">
      <div class="d-flex align-items-center">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <div>
          <strong class="me-1">¡Aviso!</strong> <span th:text="${mensajeError}"></span>
        </div>
      </div>
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
    </div>
  </div>
</div>

<footer th:fragment="footer" class="main-footer mt-auto py-4" style="background-color: #1a1f3d; color: white;">
  <div class="container text-center">
    <div class="mb-2">
      <a class="text-white text-decoration-none fw-bold fs-5" th:href="@{/}">Sleipnir</a>
    </div>
    <span class="small opacity-75">&copy; 2026 Sleipnir Alquiler</span>
    <script th:src="@{/js/alertas.js}"></script>
  </div>
</footer>

</body>
</html>
