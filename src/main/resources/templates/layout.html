<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" th:href="@{/css/styles.css}">
  <title>Sleipnir Alquiler</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.png}">

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="d-flex flex-column min-vh-100">

<nav th:fragment="header" class="navbar navbar-expand-lg navbar-dark fixed-top py-2" style="background-color: #1a1f3d !important;">
  <div class="container">
    <a class="navbar-brand fw-bold fs-3" th:href="@{/}">Sleipnir</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
      <ul class="navbar-nav gap-4">
        <li class="nav-item"><a class="nav-link fw-bold" th:href="@{/}">Inicio</a></li>
        <li class="nav-item"><a class="nav-link fw-bold" th:href="@{/reservar}">Reserva Ahora</a></li>

        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link fw-bold text-warning" th:href="@{/admin/vehiculos}">Vehículos</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link fw-bold text-warning" th:href="@{/admin/sucursales}">Sucursales</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link fw-bold text-warning" th:href="@{/admin/alquiler}">Alquiler</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link fw-bold text-warning" th:href="@{/admin/clientes}">Clientes</a>
        </li>
      </ul>
    </div>

    <div class="text-white fs-4">
      <div sec:authorize="!isAuthenticated()">
        <a th:href="@{/auth/login}" class="text-white">
          <i class="bi bi-person-circle" style="cursor: pointer;"></i>
        </a>
      </div>

      <div sec:authorize="isAuthenticated()" class="dropdown">
        <a class="text-white text-decoration-none dropdown-toggle d-flex align-items-center" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
          <i class="bi bi-person-check-fill text-success me-2"></i>
          <span class="fs-6 d-none d-md-inline" sec:authentication="name">Username</span>
        </a>
        <ul class="dropdown-menu dropdown-menu-end shadow border-0">
          <li>
            <form th:action="@{/logout}" method="post">
              <button type="submit" class="dropdown-item text-danger d-flex align-items-center">
                <i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión
              </button>
            </form>
          </li>
        </ul>
      </div>
    </div>
  </div>
</nav>

<div th:fragment="alertas" class="container" style="padding-top: 100px; margin-bottom: -50px;">

  <div sec:authorize="isAuthenticated()" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
    <i class="bi bi-shield-check me-2"></i>
    ¡Bienvenido, <strong sec:authentication="name"></strong>! Has iniciado sesión correctamente.
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
  </div>

  <div th:if="${mensajeExito}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
    <i class="bi bi-check-circle-fill me-2"></i>
    <span th:text="${mensajeExito}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
  </div>

  <div th:if="${mensajeError}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
    <i class="bi bi-exclamation-triangle-fill me-2"></i>
    <strong class="me-1">¡Aviso!</strong> <span th:text="${mensajeError}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
  </div>
</div>

<footer th:fragment="footer" class="main-footer mt-auto py-4" style="background-color: #1a1f3d; color: white;">
  <div class="container text-center">
    <div class="mb-2">
      <a class="text-white text-decoration-none fw-bold fs-5" th:href="@{/}">Sleipnir</a>
    </div>
    <span class="small opacity-75">&copy; 2026 Sleipnir Alquiler - Gestión Profesional de Flotas</span>
    <div class="mt-2 text-white-50" style="font-size: 0.8rem;">
      Madrid, España | info@sleipnir.es
    </div>
  </div>
</footer>

</body>
</html>
