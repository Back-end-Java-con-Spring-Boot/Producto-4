<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}">
    <title>Sleipnir - Formulario de Vehículo</title>
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout :: header}"></nav>

<main class="container flex-grow-1" style="margin-top: 100px; margin-bottom: 50px; max-width: 800px;">
    <div th:replace="~{layout :: alertas}"></div>
    <div class="mb-4">
        <h2 class="fw-bold text-white m-0">
            <i class="bi bi-car-front me-2"></i>
            <span th:text="${vehiculo.id == null ? 'Nuevo Vehículo' : 'Editar Vehículo'}"></span>
        </h2>
    </div>

    <div class="card border-0 shadow-lg rounded-4 text-dark">
        <div class="card-body p-5">
            <form method="post" th:object="${vehiculo}"
                  th:action="${vehiculo.id == null}
                      ? @{/admin/vehiculos/nuevo}
                      : @{/admin/vehiculos/editar/{id}(id=${vehiculo.id})}">
                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label fw-bold">Nombre</label>
                    <input type="text" class="form-control rounded-3" th:field="*{nombre}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Matrícula</label>
                    <input type="text" class="form-control rounded-3" th:field="*{matricula}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Plazas</label>
                    <input type="number" class="form-control rounded-3" th:field="*{plazas}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Tipo de Vehículo</label>
                    <select class="form-select" th:field="*{tipoVehiculo}">
                        <option th:value="${tipo}"
                                th:each="tipo: ${T(com.alquilatusvehiculos.alquila_tus_vehiculos.model.TipoVehiculo).values()}"
                                th:text="${tipo.displayName}"></option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Precio/Dia</label>
                    <input type="number" min="0" step="0.01" class="form-control rounded-3"
                           th:field="*{precioDia}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Sucursal</label>
                    <select class="form-select" th:field="*{sucursal}">
                        <option th:each="suc : ${listaSucursales}"
                                th:value="${suc.id}"
                                th:text="${suc.nombre}"></option>
                    </select>
                </div>

                <button type="submit" class="btn btn-success rounded-3">Guardar</button>
                <a th:href="@{/admin/vehiculos}" class="btn btn-danger rounded-3">Cancelar</a>
            </form>
        </div>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
