<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}">
    <title>Sleipnir - Gestión de Vehículos</title>
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout :: header}"></nav>

<main class="container flex-grow-1 admin-header" style="margin-top: 100px; margin-bottom: 50px;">

    <div th:replace="~{layout :: alertas}"></div>

    <div class="row align-items-center mb-4">
        <div class="col-md-4">
            <h2 class="fw-bold text-white m-0">Vehículos</h2>
        </div>
        <div class="col-md-8 d-flex justify-content-end gap-3">
            <div class="input-group shadow-sm w-50 search-pill">
                <span class="input-group-text"><i class="bi bi-search text-muted"></i></span>
                <input type="text" id="searchInput" class="form-control" placeholder="Buscar Vehículos...">
            </div>
            <!-- Solo ADMIN puede añadir vehículos -->
            <a sec:authorize="hasRole('ADMIN')"
               th:href="@{/admin/vehiculos/nuevo}"
               class="btn btn-primary shadow-sm px-4 rounded-pill fw-bold">
                <i class="bi bi-plus-lg me-2"></i> Añadir Vehículo
            </a>
        </div>
    </div>

    <div class="card table-card border-0 shadow-lg">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th class="ps-4 py-3">ID</th>
                    <th>NOMBRE</th>
                    <th>MATRÍCULA</th>
                    <th>PLAZAS</th>
                    <th>TIPO</th>
                    <th>PRECIO/D</th>
                    <th>SUCURSAL</th>
                    <!-- Acciones solo para ADMIN -->
                    <th sec:authorize="hasRole('ADMIN')" class="text-center pe-4">ACCIONES</th>
                </tr>
                </thead>
                <tbody id="tableBody">
                <tr th:each="vehiculo : ${vehiculos}">
                    <td class="ps-4 col-id" th:text="${vehiculo.id}"></td>
                    <td th:text="${vehiculo.nombre}"></td>
                    <td th:text="${vehiculo.matricula}"></td>
                    <td th:text="${vehiculo.plazas}"></td>
                    <td th:text="${vehiculo.tipoVehiculo.displayName}"></td>
                    <td th:text="${vehiculo.precioDia}"></td>
                    <td th:text="${vehiculo.sucursal != null ? vehiculo.sucursal.nombre : 'Sin asignar'}"></td>
                    <!-- Botones editar/eliminar solo para ADMIN -->
                    <td sec:authorize="hasRole('ADMIN')" class="text-center pe-4">
                        <div class="d-flex justify-content-center gap-2">
                            <a th:href="@{/admin/vehiculos/editar/{id}(id=${vehiculo.id})}"
                               class="btn btn-sm text-primary border-0" title="Editar">
                                <i class="bi bi-pencil-square fs-5"></i>
                            </a>
                            <a th:href="@{/admin/vehiculos/eliminar/{id}(id=${vehiculo.id})}"
                               class="btn btn-sm text-danger border-0"
                               onclick="return confirm('¿Estás seguro de eliminar este vehículo?')"
                               title="Eliminar">
                                <i class="bi bi-trash-fill fs-5"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/buscador.js}"></script>
</body>
</html>
