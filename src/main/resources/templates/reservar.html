<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}">
    <title>Sleipnir - Reservar Ahora</title>
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout :: header}"></nav>

<main class="container flex-grow-1" style="margin-top: 100px; margin-bottom: 50px;">

    <div class="text-center mb-5">
        <h1 class="fw-bold text-white mb-3 display-4">Elige tu próxima aventura</h1>
        <h5 class="text-light fw-light">Las mejores condiciones del mercado, seguro incluido y sin fianza.</h5>
    </div>

    <div class="mb-5">
        <h3 class="fw-bold text-white mb-4"><i class="bi bi-geo-alt me-2"></i>Nuestras Sucursales</h3>
        <div class="row g-4">
            <div class="col-md-4" th:each="sucursal : ${listaSucursales}">
                <div class="card h-100 shadow border-0 rounded-4 bg-light bg-opacity-10 text-white" style="backdrop-filter: blur(10px);">
                    <div class="card-body">
                        <h5 class="card-title fw-bold text-info mb-3" th:text="${sucursal.nombre}"></h5>
                        <p class="card-text mb-1">
                            <i class="bi bi-map text-white-50 me-2"></i> <span th:text="${sucursal.direccion}"></span>
                        </p>
                        <p class="card-text">
                            <i class="bi bi-telephone text-white-50 me-2"></i> <span th:text="${sucursal.telefono}"></span>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div>
        <h3 class="fw-bold text-white mb-4"><i class="bi bi-car-front me-2"></i>Flota Disponible</h3>
        <div class="row g-4">
            <div class="col-md-6 col-lg-4" th:each="vehiculo : ${listaVehiculos}">
                <div class="card h-100 shadow-lg border-0 rounded-4 overflow-hidden">

                    <img th:src="${vehiculo.imagenUrl}"
                         class="card-img-top" alt="Coche de alquiler" style="height: 220px; object-fit: cover;">

                    <div class="card-body d-flex flex-column p-4">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h5 class="card-title fw-bold text-dark mb-0" th:text="${vehiculo.nombre}"></h5>
                            <span class="badge bg-secondary rounded-pill" th:text="${vehiculo.tipoVehiculo.displayName}"></span>
                        </div>

                        <p class="text-muted small mb-3">
                            <i class="bi bi-geo-alt-fill text-danger"></i> <span th:text="${vehiculo.sucursal.nombre}"></span>
                        </p>

                        <div class="card-text flex-grow-1 text-dark">
                            <ul class="list-unstyled">
                                <li class="mb-2"><i class="bi bi-people text-primary me-2"></i> <strong th:text="${vehiculo.plazas}"></strong> Plazas</li>
                                <li class="mb-2"><i class="bi bi-hash text-primary me-2"></i> Matrícula: <span th:text="${vehiculo.matricula}"></span></li>
                            </ul>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mt-3 pt-3 border-top">
                            <div>
                                <span class="fs-4 fw-bold text-success" th:text="${vehiculo.precioDia}"></span>
                                <span class="text-muted">€ / dia</span>
                            </div>
                            <!--/* MODIFICAR HREF PARA LLEVAR AL FORMULARIO DE ALQUILER CON EL ID DEL VEHÍCULO */-->
                            <a href="#" class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm">Alquilar Vehículo</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
