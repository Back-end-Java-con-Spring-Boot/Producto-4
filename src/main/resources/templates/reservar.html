<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}">
    <title>Sleipnir - Reservar Ahora</title>
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout :: header}"></nav>

<main class="flex-grow-1">

    <header class="position-relative d-flex align-items-center justify-content-center text-center"
            style="background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                   url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1920&auto=format&fit=crop') center/cover no-repeat;
                   min-height: 400px; margin-top: 60px;">
        <div class="container">
            <h1 class="fw-bold text-white mb-3 display-4">Elige tu próxima aventura</h1>
            <h5 class="text-white-50 fw-light">Las mejores condiciones del mercado, seguro incluido y sin fianza.</h5>
        </div>
    </header>

    <div class="container mt-5">

        <div class="mb-5">
            <h3 class="fw-bold mb-4" style="color: #1a1f3d;">
                <i class="bi bi-geo-alt-fill me-2 text-primary"></i>Nuestras Sucursales
            </h3>

            <div class="row g-4">
                <div class="col-md-4" th:each="sucursal : ${listaSucursales}">
                    <div class="card h-100 shadow border-0 rounded-4 bg-white">
                        <div class="card-body p-4 text-center">
                            <div class="bg-primary bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3" style="width: 50px; height: 50px;">
                                <i class="bi bi-building text-primary fs-4"></i>
                            </div>
                            <h5 class="card-title fw-bold mb-3" style="color: #1a1f3d;" th:text="${sucursal.nombre}"></h5>
                            <p class="card-text mb-1 text-muted small">
                                <i class="bi bi-map me-2"></i> <span th:text="${sucursal.direccion}"></span>
                            </p>
                            <p class="card-text text-muted small">
                                <i class="bi bi-telephone me-2"></i> <span th:text="${sucursal.telefono}"></span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mb-5" id="flota">
            <h3 class="fw-bold mb-4" style="color: #1a1f3d;">
                <i class="bi bi-car-front-fill me-2 text-primary"></i>Flota Disponible
            </h3>

            <div class="row g-4">
                <div class="col-md-6 col-lg-4" th:each="vehiculo : ${listaVehiculos}">
                    <div class="card h-100 shadow-lg border-0 rounded-4 overflow-hidden bg-white">

                        <div class="position-relative">
                            <img th:src="${vehiculo.imagenUrl}"
                                 class="card-img-top" alt="Coche" style="height: 220px; object-fit: cover;">
                            <span class="position-absolute top-0 end-0 m-3 badge bg-primary rounded-pill px-3 py-2 shadow"
                                  th:text="${vehiculo.tipoVehiculo.displayName}"></span>
                        </div>

                        <div class="card-body d-flex flex-column p-4">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="card-title fw-bold text-dark mb-0" th:text="${vehiculo.nombre}"></h5>
                            </div>

                            <p class="text-muted small mb-3">
                                <i class="bi bi-geo-alt-fill text-danger"></i> <span th:text="${vehiculo.sucursal.nombre}"></span>
                            </p>

                            <div class="card-text flex-grow-1 text-dark">
                                <ul class="list-unstyled small">
                                    <li class="mb-2 p-2 bg-light rounded-3">
                                        <i class="bi bi-people-fill text-primary me-2"></i>
                                        <strong th:text="${vehiculo.plazas}"></strong> Plazas
                                    </li>
                                    <li class="mb-2 p-2 bg-light rounded-3">
                                        <i class="bi bi-hash text-primary me-2"></i>
                                        Matrícula: <span th:text="${vehiculo.matricula}"></span>
                                    </li>
                                </ul>
                            </div>

                            <div class="d-flex justify-content-between align-items-center mt-3 pt-3 border-top">
                                <div>
                                    <span class="fs-4 fw-bold text-success" th:text="${vehiculo.precioDia}"></span>
                                    <span class="text-muted small">€ / día</span>
                                </div>
                                <a th:href="@{/alquiler/crear(vehiculoId=${vehiculo.id})}"
                                   class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm">Reservar</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>

</body>
</html>
