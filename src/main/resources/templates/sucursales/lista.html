<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sleipnir - Lista de Sucursales</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Listado de Sucursales</h2>
        <a th:href="@{/sucursales/nueva}" class="btn btn-primary">Añadir Sucursal</a>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Dirección</th>
                    <th>Teléfono</th>
                    <th>Ciudad</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="sucursal : ${listaSucursal}">
                    <td th:text="${sucursal.id}">1</td>
                    <td th:text="${sucursal.nombre}">Nombre Falso</td>
                    <td th:text="${sucursal.direccion}">Direccion Falsa</td>
                    <td th:text="${sucursal.telefono}">600000000</td>
                    <td th:text="${sucursal.ciudad}">Ciudad Falsa</td>
                    <td>
                        <a th:href="@{/sucursales/editar/{id}(id=${sucursal.id})}" class="btn btn-sm btn-warning">Editar</a>
                        <a th:href="@{/sucursales/borrar/{id}(id=${sucursal.id})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Estás seguro de borrar esta sucursal?')">Borrar</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
