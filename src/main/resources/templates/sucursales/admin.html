<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}">
    <title>Sleipnir - Gestión de Sucursales</title>
</head>
<body class="bg-light">

<nav th:replace="~{layout :: header}"></nav>

<div class="container mt-5">
    <div class="row align-items-center mb-4">
        <div class="col-md-4">
            <h2 class="fw-bold text-dark m-0">Sucursales</h2>
        </div>
        <div class="col-md-8 d-flex justify-content-end gap-3">
            <div class="input-group shadow-sm w-50">
                <span class="input-group-text bg-white border-end-0">
                    <i class="bi bi-search text-muted"></i>
                </span>
                <input type="text" id="searchInput" class="form-control border-start-0" placeholder="Buscar Sucursales...">
            </div>
            <button type="button" class="btn btn-primary shadow-sm px-4 rounded-pill" data-bs-toggle="modal" data-bs-target="#crearModal">
                <i class="bi bi-plus-lg me-2"></i> Añadir Sucursal
            </button>
        </div>
    </div>

    <div class="card shadow border-0 rounded-4 overflow-hidden">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-white border-bottom">
                <tr class="text-secondary">
                    <th class="ps-4 py-3">ID</th>
                    <th>Nombre</th>
                    <th>Dirección</th>
                    <th>Teléfono</th>
                    <th>Ciudad</th>
                    <th class="text-center pe-4">Acciones</th>
                </tr>
                </thead>
                <tbody id="tableBody">
                <tr th:if="${#lists.isEmpty(listaSucursal)}">
                    <td colspan="6" class="text-center py-5 text-muted">
                        <i class="bi bi-info-circle d-block mb-2 fs-2"></i>
                        No hay sucursales registradas actualmente.
                    </td>
                </tr>

                <tr th:each="sucursal : ${listaSucursal}" class="border-bottom-0">
                    <td class="ps-4 fw-bold text-primary" th:text="${sucursal.id}">1</td>
                    <td th:text="${sucursal.nombre}" class="fw-semibold">Nombre</td>
                    <td th:text="${sucursal.direccion}">Dirección</td>
                    <td th:text="${sucursal.telefono}">Teléfono</td>
                    <td th:text="${sucursal.ciudad}">Ciudad</td>
                    <td class="text-center pe-4">
                        <div class="d-flex justify-content-center gap-2">
                            <button type="button" class="btn btn-sm btn-outline-primary border-0 rounded-circle p-2"
                                    data-bs-toggle="modal"
                                    th:attr="data-bs-target='#editarModal' + ${sucursal.id}"
                                    title="Editar">
                                <i class="bi bi-pencil-square fs-5"></i>
                            </button>

                            <a th:href="@{/sucursales/borrar/{id}(id=${sucursal.id})}"
                               class="btn btn-sm btn-outline-danger border-0 rounded-circle p-2"
                               onclick="return confirm('¿Estás seguro de borrar esta sucursal?')"
                               title="Eliminar">
                                <i class="bi bi-trash-fill fs-5"></i>
                            </a>
                        </div>

                        <div class="modal fade text-start" th:id="'editarModal' + ${sucursal.id}" tabindex="-1" aria-hidden="true">
                            <div class="modal-dialog modal-dialog-centered">
                                <div class="modal-content border-0 shadow-lg rounded-4">
                                    <div class="modal-header bg-warning border-0">
                                        <h5 class="modal-title fw-bold"><i class="bi bi-pencil me-2"></i> Editar Sucursal</h5>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                    </div>
                                    <form th:action="@{/sucursales/guardar}" method="post">
                                        <div class="modal-body p-4">
                                            <input type="hidden" name="id" th:value="${sucursal.id}">
                                            <div class="mb-3">
                                                <label class="form-label fw-bold">Nombre</label>
                                                <input type="text" name="nombre" th:value="${sucursal.nombre}" class="form-control rounded-3" required>
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label fw-bold">Dirección</label>
                                                <input type="text" name="direccion" th:value="${sucursal.direccion}" class="form-control rounded-3" required>
                                            </div>
                                            <div class="mb-3 d-flex gap-3">
                                                <div class="w-50">
                                                    <label class="form-label fw-bold">Teléfono</label>
                                                    <input type="text" name="telefono" th:value="${sucursal.telefono}" class="form-control rounded-3" required>
                                                </div>
                                                <div class="w-50">
                                                    <label class="form-label fw-bold">Ciudad</label>
                                                    <input type="text" name="ciudad" th:value="${sucursal.ciudad}" class="form-control rounded-3" required>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="modal-footer border-0 p-4 pt-0">
                                            <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancelar</button>
                                            <button type="submit" class="btn btn-warning rounded-pill px-4 fw-bold">Actualizar</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="crearModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header bg-primary text-white border-0">
                <h5 class="modal-title fw-bold"><i class="bi bi-plus-circle me-2"></i> Nueva Sucursal</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form th:action="@{/sucursales/guardar}" th:object="${nuevaSucursal}" method="post">
                <div class="modal-body p-4">
                    <input type="hidden" th:field="*{id}">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nombre</label>
                        <input type="text" th:field="*{nombre}" class="form-control rounded-3" placeholder="Ej: Central Madrid" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Dirección</label>
                        <input type="text" th:field="*{direccion}" class="form-control rounded-3" placeholder="Calle Ejemplo 123" required>
                    </div>
                    <div class="mb-3 d-flex gap-3">
                        <div class="w-50">
                            <label class="form-label fw-bold">Teléfono</label>
                            <input type="text" th:field="*{telefono}" class="form-control rounded-3" placeholder="600000000" required>
                        </div>
                        <div class="w-50">
                            <label class="form-label fw-bold">Ciudad</label>
                            <input type="text" th:field="*{ciudad}" class="form-control rounded-3" placeholder="Madrid" required>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 p-4 pt-0">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary rounded-pill px-4 fw-bold">Guardar Sucursal</button>
                </div>
            </form>
        </div>
    </div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/buscador.js}"></script>

</body>
</html>
